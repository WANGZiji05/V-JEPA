# ============================================================================
# V-JEPA Physion++ Latent Dynamics 评估配置
# ============================================================================
#
# [核心实验] Prediction Horizon Evaluation
#   固定 context，逐步增加预测距离 (1→7 temporal tokens)
#   测量预测相似度随 horizon 的衰减曲线
#   H=1: 7 context tokens → 1 future token   (最近)
#   H=2: 6 context tokens → 2 future tokens
#   H=4: 4 context tokens → 4 future tokens
#   H=6: 2 context tokens → 6 future tokens
#   H=7: 1 context token  → 7 future token   (最远)
#
# [辅助实验] Context Ablation
#   对每个 horizon，比较含/不含 context 的预测相似度
#   Δ = WithContext - WithoutContext
#   Δ > 0 → context 帮助了预测 → model 学到了 dynamics
#
# [分组分析] Per-Property
#   分别对 mass / friction / elasticity / deformability 评估
#
# 启动：
#   python -m evals.main --fname configs/evals/physion_rollout.yaml --devices cuda:0
# ============================================================================

nodes: 1
tasks_per_node: 1
tag: physion_rollout
eval_name: physion_rollout
resume_checkpoint: false

# 要评估的属性 (null = 全部 4 种)
properties: null

# Prediction horizon: 预测的 temporal token 数
horizons: [1, 2, 3, 4, 5, 6, 7]

# 扩散噪声参数（与训练一致）
noise_beta:
  - 0.5
  - 1.0

# ---- 数据参数 ----
data:
  dataset: /your_path_to_physion_test_data_csv.csv
  data_root: /your_path_to_physion_data_root/
  frames_per_clip: 16
  frame_step: 4
  clip_duration: null

# ---- 推理参数 ----
optimization:
  resolution: 224
  batch_size: 1
  use_bfloat16: false

# ---- 预训练模型 ----
pretrain:
  model_name: vit_huge
  checkpoint_key: target_encoder
  clip_duration: null
  frames_per_clip: 16
  tubelet_size: 2
  uniform_power: true
  use_silu: false
  tight_silu: false
  use_sdpa: true
  patch_size: 16
  folder: /your_path_to_pretrained_models/
  checkpoint: vith16.pth.tar
  write_tag: physion_rollout
